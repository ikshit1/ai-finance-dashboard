<div class="dashboard-body" *ngIf="!isAnalyticsLoading">
      <div class="cards-grid">
        <app-dashboard-card
            title="Total Savings"
            [amount]="'₹' +(analytics.totalSavings || 0)"
            icon="savings">
        </app-dashboard-card>

        <app-dashboard-card
            title="Income"
            [amount]="'₹' +(analytics.income || 0)"
            icon="payments">
        </app-dashboard-card>

        <app-dashboard-card
            title="Expenses"
            [amount]="'₹' +(analytics.expense || 0)"
            icon="trending_down">
        </app-dashboard-card>

        <app-dashboard-card
            title="Monthly Savings"
            [amount]="'₹' +(analytics.monthlySavings || 0)"
            icon="account_balance_wallet">
        </app-dashboard-card>
      </div>

      <div class="chart-section">
        <app-chart-widget></app-chart-widget>
      </div>
</div>

<div *ngIf="isAnalyticsLoading">
  Loading Dashboard...
</div>
