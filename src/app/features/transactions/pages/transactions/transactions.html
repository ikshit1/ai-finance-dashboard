<div class="transactions-page">

  <div class="page-header">
    <h2>Transactions</h2>

    <button class="add-btn">
      Add Transaction
    </button>
  </div>

  <app-search-bar></app-search-bar>

  <div *ngIf="isLoading">
    Loading transactions...
  </div>

  <div *ngIf="!isLoading">
    <app-transactions-table [transactions]="transactions"></app-transactions-table>
  </div>

</div>
