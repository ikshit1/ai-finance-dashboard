<div class="auth-container">

  <app-auth-card>

    <h1>Welcome Back</h1>

    <form>

      <div class="form-group">
        <label>Email</label>

        <input
          type="email"
          placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          placeholder="Enter password">
      </div>

      <button class="auth-btn">
        Login
      </button>

    </form>

  </app-auth-card>

</div>
