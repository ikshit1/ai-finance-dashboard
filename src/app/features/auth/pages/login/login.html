<div class="auth-page">

  <div class="bg-shapes">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="auth-card">

    <div class="auth-icon">
      🔐
    </div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
      Sign in to continue to your account
    </p>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()">

      <div class="input-group">

        <label>Email</label>

        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email">

      </div>

      <div class="input-group">

        <label>Password</label>

        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password">

      </div>

      <button
        type="submit"
        class="btn-login">

        Login

      </button>

    </form>

    <div class="auth-footer">

      Don't have an account?

      <a routerLink="/register">
        Register
      </a>

    </div>

  </div>

</div>
