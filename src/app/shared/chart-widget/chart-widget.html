<div class="chart-container">
  <h3>Income vs Expenses</h3>
  <div class="chart-info">
    <div class="chart-legend">
      <div class="legend-item">
        <span class="legend-color income"></span>
        <span>Income</span>
      </div>
      <div class="legend-item">
        <span class="legend-color expense"></span>
        <span>Expenses</span>
      </div>
    </div>
  </div>
  <div class="chart-placeholder">
    <p>Chart visualization will be displayed here</p>
    <div class="chart-bars">
      <div class="bar-group" *ngFor="let label of chartData.labels">
        <div class="bars">
          <div class="bar income-bar" style="height: 45%"></div>
          <div class="bar expense-bar" style="height: 30%"></div>
        </div>
        <span class="bar-label">{{ label }}</span>
      </div>
    </div>
  </div>
</div>
