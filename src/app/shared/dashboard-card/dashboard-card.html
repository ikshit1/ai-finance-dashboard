<div
  class="dashboard-card"
  [ngClass]="cardType">

  <div class="card-top">

    <div class="card-icon">

      <mat-icon>
        {{ icon }}
      </mat-icon>

    </div>

    <div class="card-content">

      <div class="card-title">
        {{ title }}
      </div>

      <div class="card-value">
        {{ amount }}
      </div>

      <div
        *ngIf="status"
        class="card-status">

        {{ status }}

      </div>

    </div>

  </div>

</div>
